<label [class]="wrapperClass">
  <span *ngIf="label" class="text-[11px] text-gray-600 inline-flex items-center gap-2">
    <i *ngIf="iconClass" [class]="iconClass" aria-hidden="true"></i>
    {{ label }}
  </span>

  <div class="relative">
    <i
      *ngIf="resolvedLeadingIconClass"
      [class]="resolvedLeadingIconClass + ' pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs text-gray-500'"
      aria-hidden="true"
    ></i>

    <ng-container [ngSwitch]="kind">
      <input
        *ngSwitchCase="'input'"
        [type]="resolvedInputType"
        [name]="name"
        [placeholder]="placeholder"
        [disabled]="disabled"
        [readonly]="readonly"
        [min]="min"
        [max]="max"
        [step]="step"
        [accept]="accept"
        [class]="inputClass + ' ' + inputStateClass"
        [ngModel]="value"
        (ngModelChange)="updateValue($event)"
        (blur)="markTouched()"
      />

      <button
        *ngIf="isPasswordField"
        type="button"
        class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-2 text-xs text-gray-500 transition hover:bg-olive-10 hover:text-charcoal"
        [disabled]="disabled"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
        [title]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
      >
        <i [class]="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'" aria-hidden="true"></i>
      </button>

      <textarea
        *ngSwitchCase="'textarea'"
        [name]="name"
        [placeholder]="placeholder"
        [rows]="rows"
        [disabled]="disabled"
        [readonly]="readonly"
        [class]="inputClass + ' ' + inputStateClass"
        [ngModel]="value"
        (ngModelChange)="updateValue($event)"
        (blur)="markTouched()"
      ></textarea>

      <select
        *ngSwitchCase="'select'"
        [name]="name"
        [disabled]="disabled"
        [class]="inputClass + ' ' + inputStateClass"
        [ngModel]="value"
        (ngModelChange)="updateValue($event)"
        (blur)="markTouched()"
      >
        <option *ngIf="placeholder" [ngValue]="''">{{ placeholder }}</option>
        <option *ngFor="let option of options" [ngValue]="option.value">{{ option.label }}</option>
      </select>
    </ng-container>
  </div>

  <small *ngIf="helpText && !errorText" class="mt-1 block text-xs text-muted">{{ helpText }}</small>
  <small *ngIf="errorText" class="mt-1 block text-xs text-danger">{{ errorText }}</small>
</label>
