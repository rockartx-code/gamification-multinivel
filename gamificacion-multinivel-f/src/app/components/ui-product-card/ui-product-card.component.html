<article
  *ngIf="mode === 'detailed'; else compactCard"
  class="relative overflow-hidden rounded-3xl border border-olive-30 surface-soft p-4 sm:p-5">

  <div class="flex flex-col gap-4">
    <div class="flex gap-3 sm:gap-4">
      <!-- Imagen -->
      <div class="h-32 w-24 sm:h-40 sm:w-28 shrink-0 overflow-hidden rounded-2xl border border-olive-30 bg-ivory-80">
        <img [src]="product.img" [alt]="product.name" class="h-full w-full object-cover" />
      </div>

      <!-- Contenido -->
      <div class="min-w-0 flex-1 flex flex-col">
        <!-- Precio -->
        <div class="flex justify-end">
          <div class="text-right">
            <div *ngIf="hasDiscount" class="text-[10px] text-gray-500 line-through">
              {{ originalPriceLabel }}
            </div>
            <div class="text-sm font-extrabold leading-none">
              {{ discountedPriceLabel }}
            </div>
            <div class="text-[10px]" [ngClass]="hasDiscount ? 'text-accent' : 'text-gray-500'">
              {{ discountLabel }}
            </div>
          </div>
        </div>

        <!-- Título -->
        <h4 class="mt-2 text-sm sm:text-base font-extrabold leading-snug tracking-tight line-clamp-2">
          {{ product.name }}
        </h4>

        <!-- Descripción -->
        <p class="mt-1 text-xs sm:text-sm text-gray-600 leading-snug line-clamp-3">
          {{ product.description || product.badge }}
        </p>

        <!-- Ver detalle -->
        <button
          type="button"
          class="mt-2 inline-flex items-center gap-2 text-xs sm:text-sm text-gray-700 hover:text-main"
          (click)="viewDetails.emit()">
          <span class="inline-block h-3 w-3 rounded-full bg-black"></span>
          Ver detalle
        </button>
      </div>
    </div>

    <!-- Variantes -->
    <div *ngIf="activeVariants.length > 0" class="flex flex-wrap gap-2">
      <button
        *ngFor="let variant of activeVariants"
        type="button"
        class="flex items-center gap-1.5 rounded-full border px-3 py-1 text-xs font-medium transition"
        [ngClass]="selectedVariantId === variant.id
          ? 'border-accent bg-accent/10 text-accent'
          : 'border-olive-30 bg-white/70 text-gray-700 hover:border-accent/50'"
        (click)="selectVariant(variant.id)">
        <i class="fa-solid text-[10px]"
          [ngClass]="selectedVariantId === variant.id ? 'fa-circle-check text-accent' : 'fa-circle text-gray-300'"
          aria-hidden="true"></i>
        {{ variant.name }}
      </button>
    </div>

    <!-- Acciones inferiores -->
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-2 rounded-2xl border border-olive-30 px-3 py-2">
        <span class="text-xs text-gray-600">Qty</span>
        <ui-form-field
          type="number"
          [ngModel]="qty"
          (ngModelChange)="qtyChange.emit(+$event || 0)"
          inputClass="w-14 rounded-xl border border-olive-30 bg-white/70 px-2 py-1 text-sm text-main text-center">
        </ui-form-field>
      </div>

      <ui-button
        size="lg"
        variant="primary"
        class="flex-1"
        (pressed)="add.emit()">
        <i class="fa-solid fa-cart-plus" aria-hidden="true"></i>
        Agregar a carrito
      </ui-button>
    </div>
  </div>
</article>

<ng-template #compactCard>
  <article class="flex min-w-0 items-center gap-3 rounded-2xl border border-olive-30 bg-ivory-80 p-3 overflow-hidden">

    <!-- Imagen -->
    <div class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-xl border border-olive-30 bg-white">
      <img [src]="product.img" [alt]="product.name" class="h-full w-full object-cover" />
    </div>

    <!-- Info -->
    <div class="min-w-0 flex-1">
      <div class="truncate text-sm font-semibold text-main" [title]="product.name">
        {{ product.name }}
      </div>

      <div class="text-xs text-gray-500 truncate">
        {{ product.badge }}
      </div>

      <div class="mt-1 text-sm font-extrabold">
        {{ discountedPriceLabel }}
      </div>
    </div>

    <!-- Acciones -->
    <div class="flex items-center gap-1 shrink-0">
      <button
        type="button"
        class="flex h-8 w-8 items-center justify-center rounded-full text-gray-600 hover:bg-black/5"
        (click)="viewDetails.emit()">
        <i class="fa-solid fa-circle-info text-xs"></i>
      </button>

      <button
        type="button"
        class="flex h-8 w-8 items-center justify-center rounded-full bg-accent text-white hover:opacity-90"
        (click)="add.emit()">
        <i class="fa-solid fa-cart-plus text-xs"></i>
      </button>
    </div>
  </article>
</ng-template>
