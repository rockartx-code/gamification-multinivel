<section class="min-h-screen bg-sand-200 text-charcoal antialiased">
  <ui-header variant="default" containerClass="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
    <ui-button variant="ghost" size="md" iconClass="fa-solid fa-arrow-left" [routerLink]="['/login']">
      Volver al login
    </ui-button>
  </ui-header>

  <main class="mx-auto flex max-w-5xl flex-col gap-10 px-6 py-12">
    <div class="mx-auto w-full max-w-2xl overflow-hidden rounded-3xl border border-olive-30 bg-ivory-80 p-6 shadow-sm">
      <div class="space-y-5">
        <div class="space-y-2">
          <div class="flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-gray-600">
            <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
            Recuperacion segura
          </div>
          <h1 class="text-2xl font-extrabold">Cambiar contrasena</h1>
        </div>

        <ui-form-field
          name="email"
          type="email"
          label="Correo electronico"
          leadingIconClass="fa-solid fa-envelope"
          placeholder="tu@correo.com"
          [(ngModel)]="email"
          inputClass="mt-2 w-full rounded-2xl border border-olive-30 bg-white/70 px-4 py-3 text-sm text-main outline-none focus-border-olive-60 focus:ring-2 focus-ring-olive-20"
        ></ui-form-field>

        <ui-form-field
          name="otp"
          label="OTP"
          leadingIconClass="fa-solid fa-key"
          placeholder="Codigo de 6 digitos"
          [(ngModel)]="otp"
          inputClass="mt-2 w-full rounded-2xl border border-olive-30 bg-white/70 px-4 py-3 text-sm text-main outline-none focus-border-olive-60 focus:ring-2 focus-ring-olive-20"
        ></ui-form-field>

        <label class="block">
          <span class="inline-flex items-center gap-2 text-[11px] text-gray-600">Nueva contrasena</span>
          <div class="relative">
            <i class="fa-solid fa-lock pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-xs text-gray-500" aria-hidden="true"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              placeholder="Nueva contrasena"
              [(ngModel)]="password"
              class="mt-2 w-full rounded-2xl border border-olive-30 bg-white/70 px-4 py-3 pl-10 pr-12 text-sm text-main outline-none focus-border-olive-60 focus:ring-2 focus-ring-olive-20"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-2 text-gray-500 transition hover:bg-olive-10 hover:text-charcoal"
              (click)="togglePasswordVisibility('password')"
              [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
            >
              <i [class]="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'" aria-hidden="true"></i>
            </button>
          </div>
        </label>

        <label class="block">
          <span class="inline-flex items-center gap-2 text-[11px] text-gray-600">Confirmar contrasena</span>
          <div class="relative">
            <i class="fa-solid fa-lock pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-xs text-gray-500" aria-hidden="true"></i>
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              placeholder="Repite la contrasena"
              [(ngModel)]="confirmPassword"
              class="mt-2 w-full rounded-2xl border border-olive-30 bg-white/70 px-4 py-3 pl-10 pr-12 text-sm text-main outline-none focus-border-olive-60 focus:ring-2 focus-ring-olive-20"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-2 text-gray-500 transition hover:bg-olive-10 hover:text-charcoal"
              (click)="togglePasswordVisibility('confirm')"
              [attr.aria-label]="showConfirmPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
            >
              <i [class]="showConfirmPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'" aria-hidden="true"></i>
            </button>
          </div>
        </label>

        <p *ngIf="errorMessage" class="rounded-2xl border border-red-500/25 bg-red-500/10 px-4 py-3 text-xs text-danger-deep">
          {{ errorMessage }}
        </p>
        <p *ngIf="successMessage" class="rounded-2xl border border-emerald-500/20 bg-emerald-500/10 px-4 py-3 text-xs text-emerald-800">
          {{ successMessage }}
        </p>

        <div class="flex flex-col gap-3 sm:flex-row">
          <ui-button variant="secondary" size="lg" iconClass="fa-solid fa-key" [disabled]="isSubmitting" (pressed)="submit()">
            {{ isSubmitting ? 'Actualizando...' : 'Guardar nueva contrasena' }}
          </ui-button>
          <ui-button variant="ghost" size="lg" iconClass="fa-solid fa-right-to-bracket" [routerLink]="['/login']">
            Volver al login
          </ui-button>
        </div>
      </div>
    </div>
  </main>

  <ui-footer></ui-footer>
</section>
