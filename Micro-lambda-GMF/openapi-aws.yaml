openapi: "3.0.1"

info:
  title: "Gamification Multinivel API"
  description: |
    API REST para la plataforma de gamificación multinivel. Diseñada para importar
    directamente en **AWS API Gateway REST API (v1)**.

    ## Estrategia de rutas
    - **Rutas explícitas**: endpoints raíz de colecciones (`GET /orders/find`, `POST /products`, etc.)
    - **`{proxy+}` greedy**: captura todos los sub-paths de cada recurso y los reenvía
      al mismo Lambda handler, que resuelve la ruta internamente.

    ## Autenticación
    El API Gateway público de auth entra por `/auth/{proxy+}`.
    `POST /auth/login` devuelve el JWT de sesión y el perfil del usuario.
    `POST /auth/password/recovery` y `POST /auth/password/reset` también son públicas y no requieren JWT.
    Las rutas protegidas aceptan los headers `x-user-id`, `x-user-name` y `x-user-role`
    y también `Authorization: Bearer <jwt>` cuando el cliente ya tiene sesión iniciada.

    ## Variables a sustituir antes de importar
    - `${AWS_REGION}` — Región AWS (ej. `us-east-1`)
    - `${LAMBDA_ARN}` — ARN completo de la función Lambda principal

    ## Nuevos endpoints separados (split de `/user-dashboard`)
    - `GET /catalog` — catálogo público resumido (`products`, `productOfMonth`)
    - `GET /customers/dashboard` — dashboard autenticado del cliente actual

    ## Split de carga del dashboard
    El frontend llama a `GET /catalog` y `GET /customers/dashboard` en paralelo (`forkJoin`)
    en lugar del monolítico `GET /user-dashboard`.
  version: "1.0.0"
  contact:
    name: "rockartx-code"

servers:
  - url: "https://ge2omdgk33.execute-api.us-east-1.amazonaws.com/Prod"
    description: "Desarrollo"
  - url: "https://m85v7secp8.execute-api.us-east-1.amazonaws.com/default/Multinivel"
    description: "Producción"

# ─── Bloque CORS OPTIONS reutilizable ──────────────────────────────────────────
# NOTA: usa YAML merge key (<<:). Si tu parser no lo soporta, expande cada bloque.
x-cors-options-template: &cors-options
  summary: "CORS preflight"
  tags: ["CORS"]
  responses:
    "200":
      description: "CORS OK"
      headers:
        Access-Control-Allow-Headers:
          schema: { type: string }
        Access-Control-Allow-Methods:
          schema: { type: string }
        Access-Control-Allow-Origin:
          schema: { type: string }
  x-amazon-apigateway-integration:
    type: mock
    requestTemplates:
      application/json: '{"statusCode":200}'
    responses:
      default:
        statusCode: "200"
        responseParameters:
          method.response.header.Access-Control-Allow-Headers: >-
            'Content-Type,Authorization,x-user-id,x-user-name,x-user-role,X-Amz-Date,X-Api-Key'
          method.response.header.Access-Control-Allow-Methods: >-
            'GET,POST,PUT,PATCH,DELETE,OPTIONS'
          method.response.header.Access-Control-Allow-Origin: "'*'"
        responseTemplates:
          application/json: "{}"

# ─── Bloque de integración Lambda reutilizable ─────────────────────────────────
x-lambda-proxy: &lambda-proxy
  type: aws_proxy
  httpMethod: POST
  uri: "arn:aws:apigateway:${AWS_REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"
  passthroughBehavior: when_no_match
  contentHandling: CONVERT_TO_TEXT
  timeoutInMillis: 29000

x-lambda-proxy-path: &lambda-proxy-path
  type: aws_proxy
  httpMethod: POST
  uri: "arn:aws:apigateway:${AWS_REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"
  passthroughBehavior: when_no_match
  contentHandling: CONVERT_TO_TEXT
  timeoutInMillis: 29000
  cacheKeyParameters:
    - method.request.path.proxy

# ─── Validadores ───────────────────────────────────────────────────────────────
x-amazon-apigateway-request-validators:
  params-only:
    validateRequestBody: false
    validateRequestParameters: true
  body-and-params:
    validateRequestBody: true
    validateRequestParameters: true

# ─── Componentes ───────────────────────────────────────────────────────────────
components:
  securitySchemes:
    UserSession:
      type: apiKey
      in: header
      name: x-user-id
      description: "ID del usuario en sesión (numérico como string)"

  parameters:
    xUserId:
      name: x-user-id
      in: header
      required: false
      schema: { type: string }
    xUserRole:
      name: x-user-role
      in: header
      required: false
      schema:
        type: string
        enum: [admin, cliente, employee]
    xUserName:
      name: x-user-name
      in: header
      required: false
      schema: { type: string }
    proxyPath:
      name: proxy
      in: path
      required: true
      description: "Path greedy capturado por API Gateway"
      schema: { type: string }

  responses:
    Unauthorized:
      description: "No autorizado"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: "Recurso no encontrado"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: "Solicitud inválida"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Respuestas genéricas ─────────────────────────────────────────────────
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
        Error:
          type: string
          enum: [NotFound, BadRequest, Unauthorized, Conflict]

    # ── Auth ─────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT de sesión a reutilizar durante la sesión autenticada.
        user:
          type: object
          required: [name, role]
          properties:
            userId:
              oneOf: [{ type: string }, { type: integer }]
            name:
              type: string
            role:
              type: string
              enum: [admin, cliente, employee]
            canAccessAdmin:
              type: boolean
            privileges:
              type: object
              additionalProperties: true
          additionalProperties: true

    CreateAccountRequest:
      type: object
      required: [name, email, phone]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        referrerId:
          oneOf: [{ type: string }, { type: integer }]
        address:
          type: object
          additionalProperties: true

    PasswordRecoveryRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [email, otp, password]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
        password:
          type: string

    # ── Productos ────────────────────────────────────────────────────────────
    SaveProductRequest:
      type: object
      required: [name, price]
      properties:
        id:
          oneOf: [{ type: integer }, { type: "null" }]
        name:
          type: string
        price:
          type: string
        active:
          type: boolean
        inOnlineStore:
          type: boolean
        inPOS:
          type: boolean
        commissionable:
          type: boolean
        sku:
          type: string
        hook:
          type: string
        description:
          type: string
        copyFacebook:
          type: string
        copyInstagram:
          type: string
        copyWhatsapp:
          type: string
        tags:
          type: string
        categoryIds:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              price:
                type: string
              sku:
                type: string
              active:
                type: boolean
              img:
                type: string
        weightKg:
          oneOf: [{ type: string }, { type: number }]
        lengthCm:
          oneOf: [{ type: string }, { type: number }]
        widthCm:
          oneOf: [{ type: string }, { type: number }]
        heightCm:
          oneOf: [{ type: string }, { type: number }]

    # ── Órdenes ──────────────────────────────────────────────────────────────
    CreateOrderRequest:
      type: object
      required: [customerId, items]
      properties:
        customerId:
          oneOf: [{ type: string }, { type: integer }]
        items:
          type: array
          items:
            type: object
            required: [productId, qty]
            properties:
              productId:
                type: string
              variantId:
                type: string
              qty:
                type: integer
              price:
                type: number
        shippingAddress:
          type: object
          additionalProperties: true
        stockId:
          type: string
        deliveryMethod:
          type: string
          enum: [envio, retiro]
        notes:
          type: string

    # ── Assets ───────────────────────────────────────────────────────────────
    CreateAssetRequest:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [image, document, receipt]
        name:
          type: string
        contentType:
          type: string
          example: "image/jpeg"
        folder:
          type: string

    AssetResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          format: uri
          description: "URL pre-firmada de S3 para subir el archivo directamente"
        assetId:
          type: string
        key:
          type: string
        expiresIn:
          type: integer

    # ── Inventario ───────────────────────────────────────────────────────────
    StockEntryRequest:
      type: object
      required: [productId, qty]
      properties:
        productId:
          type: string
        variantId:
          type: string
        qty:
          type: integer
        costPerUnit:
          type: number
        note:
          type: string
        userId:
          type: string

    StockDamageRequest:
      type: object
      required: [productId, qty, reason]
      properties:
        productId:
          type: string
        variantId:
          type: string
        qty:
          type: integer
        reason:
          type: string
        userId:
          type: string

    StockTransferRequest:
      type: object
      required: [sourceStockId, destStockId, lines]
      properties:
        sourceStockId:
          type: string
        destStockId:
          type: string
        lines:
          type: array
          items:
            type: object
            required: [productId, qty]
            properties:
              productId:
                type: string
              variantId:
                type: string
              qty:
                type: integer
        notes:
          type: string

    # ── Envíos ───────────────────────────────────────────────────────────────
    ShippingQuoteRequest:
      type: object
      required: [originStockId, destinationAddress, items]
      properties:
        originStockId:
          type: string
        destinationAddress:
          type: object
          required: [zip, state, country]
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zip:
              type: string
            country:
              type: string
              default: "MX"
        items:
          type: array
          items:
            type: object
            required: [productId, qty]
            properties:
              productId:
                type: string
              qty:
                type: integer

    # ── Comisiones ───────────────────────────────────────────────────────────
    CommissionRequestPayload:
      type: object
      required: [customerId, monthKey, amount]
      properties:
        customerId:
          oneOf: [{ type: string }, { type: integer }]
        monthKey:
          type: string
          example: "2026-04"
        amount:
          type: number
        clabeId:
          type: string

    # ── Empleados ────────────────────────────────────────────────────────────
    CreateEmployeeRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        phone:
          type: string
        stockId:
          type: string

# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════
  /crearcuenta:
    post:
      summary: "Registrar nueva cuenta de distribuidor"
      operationId: createAccount
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        "201":
          description: "Cuenta creada"
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    type: object
                    additionalProperties: true
                  requiresEmailVerification:
                    type: boolean
        "409":
          description: "Email ya registrado"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /auth/{proxy+}:
    # Captura: POST /auth/login | POST /auth/password/recovery | POST /auth/password/reset | POST /auth/verify-email
    x-amazon-apigateway-any-method:
      summary: "Auth sub-rutas (proxy)"
      description: |
        Proxy público del gateway de autenticación. Estas rutas NO requieren JWT.

        | Método | Path | Auth | Respuesta |
        |--------|------|------|-----------|
        | POST | /auth/login | Pública | `LoginResponse` con JWT |
        | POST | /auth/password/recovery | Pública | `OkResponse` |
        | POST | /auth/password/reset | Pública | `OkResponse` |
        | POST | /auth/verify-email | Pública | ⚠️ pendiente backend |
      operationId: authProxy
      tags: [Auth]
      security: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
      responses:
        "200":
          description: "Respuesta de autenticación"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/OkResponse'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # CLIENTES
  # ════════════════════════════════════════════════════════════
  /customers:
    get:
      summary: "Listar clientes"
      operationId: listCustomers
      tags: [Customers]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "Lista de clientes"
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    post:
      summary: "Crear cliente (admin — con estructura de red)"
      operationId: createCustomer
      tags: [Customers]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        "201":
          description: "Cliente creado"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /customers/sponsor/{idSponsor}:
    get:
      summary: "Datos públicos básicos del sponsor"
      description: |
        Endpoint público para la landing y el registro.
        Devuelve solamente nombre completo, correo y teléfono del sponsor.
      operationId: getPublicSponsor
      tags: [Customers]
      parameters:
        - name: idSponsor
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Datos básicos del sponsor"
          content:
            application/json:
              schema:
                type: object
                properties:
                  sponsor:
                    type: object
                    properties:
                      name: { type: string }
                      email: { type: string }
                      phone: { type: string }
        "404":
          $ref: '#/components/responses/NotFound'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /customers/{proxy+}:
    # Captura:
    #   GET    /customers/{customerId}
    #   PATCH  /customers/{customerId}
    #   PATCH  /customers/{customerId}/privileges
    #   POST   /customers/{customerId}/documents
    #   POST   /customers/{customerId}/password        ⚠️ pendiente
    #   PATCH  /customers/{customerId}/profile         ⚠️ pendiente
    #   POST   /customers/clabe
    x-amazon-apigateway-any-method:
      summary: "Sub-rutas de clientes (proxy)"
      description: |
        | Método | Path | Auth | Estado |
        |--------|------|------|--------|
        | GET    | /customers/{customerId} | admin | ✅ |
        | PATCH  | /customers/{customerId} | admin | ✅ |
        | PATCH  | /customers/{customerId}/privileges | admin | ✅ |
        | POST   | /customers/{customerId}/documents | admin | ✅ |
        | POST   | /customers/{customerId}/password | cliente | ⚠️ pendiente |
        | PATCH  | /customers/{customerId}/profile | cliente | ⚠️ pendiente |
        | POST   | /customers/clabe | cliente | ✅ |
      operationId: customersProxy
      tags: [Customers]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "OK"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # PERFIL PROPIO
  # ════════════════════════════════════════════════════════════
  /profile/{proxy+}:
    # Captura: POST /profile/documents  ⚠️ pendiente backend
    x-amazon-apigateway-any-method:
      summary: "Perfil del usuario autenticado (proxy)"
      description: |
        | Método | Path | Estado |
        |--------|------|--------|
        | POST | /profile/documents | ⚠️ pendiente backend |
      operationId: profileProxy
      tags: [Customers]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "OK"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # ADMIN
  # ════════════════════════════════════════════════════════════
  /admin/{proxy+}:
    # Captura:
    #   GET  /admin/dashboard
    #   GET  /admin/orders?status=X&limit=N
    #   GET  /admin/warnings
    #   POST /admin/commissions/receipt
    x-amazon-apigateway-any-method:
      summary: "Panel de administración (proxy)"
      description: |
        | Método | Path | Body / Query |
        |--------|------|-------------|
        | GET  | /admin/dashboard | — |
        | GET  | /admin/orders | `?status&limit` |
        | GET  | /admin/warnings | — |
        | POST | /admin/commissions/receipt | `CommissionReceiptPayload` |
      operationId: adminProxy
      tags: [Admin]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: "OK"
        "401":
          $ref: '#/components/responses/Unauthorized'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # PRODUCTOS
  # ════════════════════════════════════════════════════════════
  /products:
    get:
      summary: "Listar productos activos"
      operationId: listProducts
      tags: [Products]
      responses:
        "200":
          description: "Lista de productos"
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    post:
      summary: "Crear o actualizar producto"
      operationId: saveProduct
      tags: [Products]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveProductRequest'
      responses:
        "200":
          description: "Producto guardado"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /products/{proxy+}:
    # Captura:
    #   GET  /products/{productId}
    #   POST /products/assets
    #   GET  /products/product-of-month
    #   POST /products/product-of-month
    x-amazon-apigateway-any-method:
      summary: "Sub-rutas de productos (proxy)"
      description: |
        | Método | Path | Body |
        |--------|------|------|
        | GET  | /products/{productId} | — |
        | POST | /products/assets | `{type, name, contentType, productId}` |
        | GET  | /products/product-of-month | — |
        | POST | /products/product-of-month | `{productId}` |
      operationId: productsProxy
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "OK"
        "404":
          $ref: '#/components/responses/NotFound'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # CATEGORÍAS
  # ════════════════════════════════════════════════════════════
  /product-categories:
    get:
      summary: "Listar categorías de productos"
      operationId: listCategories
      tags: [Categories]
      responses:
        "200":
          description: "Árbol de categorías"
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        parentId:
                          type: string
                        children:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    post:
      summary: "Crear o actualizar categoría"
      operationId: saveCategory
      tags: [Categories]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                id:
                  type: string
                name:
                  type: string
                parentId:
                  type: string
      responses:
        "200":
          description: "Categoría guardada"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /product-categories/{proxy+}:
