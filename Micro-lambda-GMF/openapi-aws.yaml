                    type: string
                  photoUrl:
                    type: string
        "404":
          $ref: '#/components/responses/NotFound'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # INVENTARIO / ALMACENES
  # ════════════════════════════════════════════════════════════
  /stocks:
    get:
      summary: "Listar almacenes con inventario actual"
      operationId: listStocks
      tags: [Inventory]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "Lista de almacenes"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    post:
      summary: "Crear almacén"
      operationId: createStock
      tags: [Inventory]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, location]
              properties:
                name:
                  type: string
                location:
                  type: string
                type:
                  type: string
                  enum: [warehouse, store, virtual]
      responses:
        "201":
          description: "Almacén creado"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /stocks/{proxy+}:
    # Captura:
    #   PATCH /stocks/{stockId}
    #   POST  /stocks/{stockId}/entries
    #   POST  /stocks/{stockId}/damages
    #   GET   /stocks/transfers          ?stockId=X
    #   POST  /stocks/transfers
    #   POST  /stocks/transfers/{transferId}/receive
    #   GET   /stocks/movements          ?stockId=X
    x-amazon-apigateway-any-method:
      summary: "Sub-rutas de inventario (proxy)"
      description: |
        | Método | Path | Body / Query |
        |--------|------|-------------|
        | PATCH | /stocks/{stockId} | `{name?, location?}` |
        | POST  | /stocks/{stockId}/entries | `StockEntryRequest` |
        | POST  | /stocks/{stockId}/damages | `StockDamageRequest` |
        | GET   | /stocks/transfers | `?stockId` |
        | POST  | /stocks/transfers | `StockTransferRequest` |
        | POST  | /stocks/transfers/{transferId}/receive | `{receivedByUserId?}` |
        | GET   | /stocks/movements | `?stockId` |
      operationId: stocksProxy
      tags: [Inventory]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
        - name: stockId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: "OK"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  /pickup-stocks:
    get:
      summary: "Listar puntos de retiro disponibles"
      description: "Público — usado en el checkout para seleccionar punto de retiro."
      operationId: listPickupStocks
      tags: [Inventory]
      responses:
        "200":
          description: "Puntos de retiro"
          content:
            application/json:
              schema:
                type: object
                properties:
                  stocks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        location:
                          type: string
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # POS — PUNTO DE VENTA
  # ════════════════════════════════════════════════════════════
  /pos/{proxy+}:
    # Captura:
    #   GET  /pos/sales        ?stockId=X
    #   POST /pos/sales
    #   GET  /pos/cash-control ?stockId=X
    #   POST /pos/cash-cut
    x-amazon-apigateway-any-method:
      summary: "Punto de venta presencial (proxy)"
      description: |
        | Método | Path | Body / Query |
        |--------|------|-------------|
        | GET  | /pos/sales | `?stockId` |
        | POST | /pos/sales | `{stockId, items[], customerId?, paymentMethod}` |
        | GET  | /pos/cash-control | `?stockId` |
        | POST | /pos/cash-cut | `{stockId}` |
      operationId: posProxy
      tags: [POS]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
        - name: stockId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: "OK"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # ENVÍOS
  # ════════════════════════════════════════════════════════════
  /shipping/{proxy+}:
    # Captura: POST /shipping/quote
    x-amazon-apigateway-any-method:
      summary: "Cotización de envío (proxy)"
      description: |
        | Método | Path | Body |
        |--------|------|------|
        | POST | /shipping/quote | `ShippingQuoteRequest` |

        Integra con Skydropx / Enviaya para obtener tarifas en tiempo real.
      operationId: shippingProxy
      tags: [Shipping]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShippingQuoteRequest'
      responses:
        "200":
          description: "Tarifas de envío disponibles"
          content:
            application/json:
              schema:
                type: object
                properties:
                  rates:
                    type: array
                    items:
                      type: object
                      properties:
                        carrier:
                          type: string
                        service:
                          type: string
                        price:
                          type: number
                        currency:
                          type: string
                          default: MXN
                        estimatedDays:
                          type: integer
                        rateId:
                          type: string
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # EMPLEADOS
  # ════════════════════════════════════════════════════════════
  /employees:
    get:
      summary: "Listar empleados"
      operationId: listEmployees
      tags: [Employees]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "Lista de empleados"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    post:
      summary: "Crear empleado"
      operationId: createEmployee
      tags: [Employees]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        "201":
          description: "Empleado creado"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy
    options:
      <<: *cors-options

  /employees/{proxy+}:
    # Captura:
    #   PATCH /employees/{employeeId}
    #   PATCH /employees/{employeeId}/privileges
    x-amazon-apigateway-any-method:
      summary: "Sub-rutas de empleados (proxy)"
      description: |
        | Método | Path | Body |
        |--------|------|------|
        | PATCH | /employees/{employeeId} | `{name?, phone?, stockId?}` |
        | PATCH | /employees/{employeeId}/privileges | `{canManageInventory?, canManagePOS?, ...}` |
      operationId: employeesProxy
      tags: [Employees]
      security:
        - UserSession: []
      parameters:
        - $ref: '#/components/parameters/proxyPath'
        - $ref: '#/components/parameters/xUserId'
        - $ref: '#/components/parameters/xUserRole'
      responses:
        "200":
          description: "OK"
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

  # ════════════════════════════════════════════════════════════
  # WEBHOOKS
  # ════════════════════════════════════════════════════════════
  /webhooks/{proxy+}:
    # Captura:
    #   POST /webhooks/mercadolibre  — Notificación de pago
    #   GET  /webhooks/mercadolibre  — Challenge / verificación
    x-amazon-apigateway-any-method:
      summary: "Webhooks de integraciones externas (proxy)"
      description: |
        | Método | Path | Origen |
        |--------|------|--------|
        | POST | /webhooks/mercadolibre | MercadoLibre Payments |
        | GET  | /webhooks/mercadolibre | MercadoLibre challenge |

        ⚠️ Esta ruta NO debe tener autenticación por custom headers — MercadoLibre
        no los envía. La validación se hace con la firma del payload en el Lambda.
      operationId: webhooksProxy
      tags: [Webhooks]
      parameters:
        - $ref: '#/components/parameters/proxyPath'
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
      x-amazon-apigateway-integration:
        <<: *lambda-proxy-path
    options:
      <<: *cors-options

